<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kakusei — An anime-inspired scroll reveal experience. Unleash domain expansions that shatter and redefine absolute power.">
    <title>Kakusei — 覚醒</title>
    <link rel="icon" type="image/png" href="./favicon.png">
</head>

<style>
    @font-face {
        font-family: 'Nasalization Rg';
        src: url('./assets/fonts/Nasalization Rg.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Nasalization Rg', sans-serif;
    }

    body {
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
        background: #0f0f0f;
        color: #f5f5f0;
    }


    .container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .intro {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .intro h1 {
        font-family: 'Nasalization Rg', sans-serif !important;
        font-size: 1rem;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #999;
    }

    .site-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 40px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
    }

    .site-header .logo {
        font-family: 'Nasalization Rg', sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #f5f5f0;
    }

    .site-header nav {
        display: flex;
        gap: 40px;
        align-items: center;
    }

    .site-header nav a {
        color: #f5f5f0;
        text-decoration: none;
        font-family: 'Nasalization Rg', sans-serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: color 0.3s ease;
    }

    .site-header nav a:hover {
        color: #999;
    }

    .site-footer {
        padding: 60px 0;
        text-align: center;
        font-family: 'Nasalization Rg', sans-serif !important;
        font-size: 0.85rem;
        color: #666;
        letter-spacing: 1px;
        text-transform: uppercase;
    }


    .line {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }

    .line span {
        font-size: 7.5rem;
        font-weight: 700;
        letter-spacing: -4px;
        display: inline-block;
        overflow: hidden;
    }

    .img-span {
        height: 110px;
        width: 0;
        border-radius: 5px;
        overflow: hidden;
        position: relative;
    }

    img {
        height: 100%;
        width: 300px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 5px;
        object-fit: cover;
        object-position: center center;
    }
</style>

<body>
    <header class="site-header">
        <div class="logo">Y7XIFIED</div>
        <nav>
            <a href="#">Work</a>
            <a href="#">Studio</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="intro">
        <h1>Scroll to explore</h1>
    </div>
    <div class="container">
        <div class="line">
            <span>I have</span>
            <span class="img-span">
                <img src="./assets/img/Mahoraga.jpg" alt="">
            </span>
            <span>awakened</span>
        </div>
        <div class="line">
            <span>beyond all</span>
            <span class="img-span">
                <img src="./assets/img/download.jpg" alt="">
            </span>
            <span>known limits</span>
        </div>
        <div class="line">
            <span>gods crumble</span>
            <span class="img-span">
                <img src="./assets/img/download (1).jpg" alt="">
            </span>
            <span>before me</span>
        </div>
        <div class="line">
            <span>this is my domain.</span>
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 Y7XIFIED. All rights reserved.</p>
    </footer>

    <!-- GSAP Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- GSAP ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>

    <script type="module">
        window.addEventListener("load", () => {
            const lenis = new Lenis();
            lenis.on('scroll', ScrollTrigger.update);
            gsap.ticker.add((time) => {
                lenis.raf(time * 1000);
            });
            gsap.ticker.lagSmoothing(0);

            // Header Entrance Animations
            gsap.from(".site-header .logo", {y: -50, opacity: 0, duration: 1, ease: "power3.out", delay: 0.2});
            gsap.from(".site-header nav a", {y: -50, opacity: 0, duration: 1, ease: "power3.out", stagger: 0.15, delay: 0.4});
            
            // Intro Text Entrance & Continuous Bobbing
            gsap.fromTo(".intro h1", 
                { opacity: 0, y: 20 }, 
                { opacity: 1, y: 0, duration: 1.5, ease: "power3.out", delay: 1, onComplete: () => {
                    gsap.to(".intro h1", { y: -10, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: -1 });
                }}
            );

            document.querySelectorAll('.line').forEach((line) => {
                const imgSpan = line.querySelector('.img-span');

                if (imgSpan) {
                    gsap.to(imgSpan, {
                        width: 300,
                        ease: "none",
                        scrollTrigger: {
                            trigger: line,
                            start: "top 90%",
                            end: "top 40%",
                            scrub: 1,
                        }
                    });
                }
            });
        })
    </script>
</body>

</html>
